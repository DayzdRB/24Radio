<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Favicon.png">
<title>24Radio - ATC24 Radio Client</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #0f0;
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  margin: 15px 0;
}

.main-container {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  flex-wrap: wrap;
}

/* RADIO PANEL */
#radio-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  padding: 20px;
  flex: 0 0 auto;
  position: relative;
}

/* 🔥 SINGLE SOURCE OF TRUTH GRID */
.radio-grid {
  display: grid;
  grid-template-columns: 160px 160px 160px;
  column-gap: 15px;
  justify-content: center;
  align-items: end;
}

/* TOP ROW */
.freq-row {
  margin-bottom: 15px;
}

.freq-box {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#active-freq,
#standby-freq {
  width: 160px;
  text-align: center;
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  font-family: "Courier New", monospace;
  font-size: 20px;
  padding: 8px 16px;
}

/* SWAP */
#swap-btn {
  width: 160px;
  height: 46px;
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  font-family: "Courier New", monospace;
  cursor: pointer;
}

/* KNOB AREA */
.knob-area {
  margin-top: 15px;
  display: flex;
  justify-content: center;
}

/* STEP BUTTON GOES IN SAME GRID COLUMN (COL 2) */
#step-btn {
  grid-column: 2;

  margin-top: 10px;

  width: 160px;
  height: 46px;

  background: #000;
  color: #0f0;
  border: 2px solid #0f0;

  font-family: "Courier New", monospace;
  font-size: 14px;

  display: flex;
  align-items: center;
  justify-content: center;

  white-space: nowrap;
  cursor: pointer;
}

/* CONTROLLER PANEL (UNCHANGED) */
#controller-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  width: 90%;
  max-width: 900px;
  padding: 15px;
  flex: 1;
}

.controller-toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.controller-toolbar input,
.controller-toolbar select {
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 6px;
  font-family: "Courier New", monospace;
}

#frequency-list {
  margin-top: 10px;
  padding: 10px;
  background: #111;
  border: 2px solid #0f0;
  overflow-y: auto;
}
</style>
</head>

<body>

<h1>24Radio</h1>

<div class="main-container">

<div id="radio-panel">

  <!-- SHARED GRID -->
  <div class="radio-grid freq-row">

    <div class="freq-box">
      <div>COM1 ACTIVE</div>
      <div id="active-freq">---</div>
    </div>

    <div class="freq-box">
      <div>COM1 STANDBY</div>
      <input id="standby-freq" placeholder="118.100">
    </div>

    <div class="freq-box">
      <button id="swap-btn">SWAP</button>
    </div>

    <!-- STEP aligned to column 2 -->
    <button id="step-btn">STEP: 0.050</button>

  </div>

  <div class="knob-area">
    <div class="knob" id="freq-knob"></div>
  </div>

</div>

<div id="controller-panel">
  <div class="panel-title">FREQUENCY DATABASE</div>

  <div class="controller-toolbar">
    <input type="text" id="search-bar">
    <select id="filter-area"></select>
    <select id="filter-airport"></select>
    <select id="filter-type"></select>
  </div>

  <div id="frequency-list"></div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
