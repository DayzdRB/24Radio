<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>24Radio - ATC24 Cockpit Panel</title>
    <style>
        body { 
            background: #121212; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            padding-top: 50px; 
        }
        .radio-chassis { 
            background: #2b2b2b; 
            border: 5px solid #444444; 
            display: inline-block; 
            padding: 25px; 
            border-radius: 12px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.5);
        }
        .frequency-box {
            display: inline-block;
            margin: 10px 20px;
        }
        .label {
            font-size: 14px;
            color: #888888;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .display { 
            font-size: 36px; 
            color: #00ff66; 
            background: #051a05; 
            padding: 12px 25px; 
            border-radius: 6px; 
            border: 2px solid #004411;
            min-width: 140px; 
            display: inline-block; 
            letter-spacing: 2px;
            box-shadow: inset 0px 0px 10px rgba(0,255,102,0.3);
        }
        .controls {
            margin-top: 20px;
        }
        button { 
            background: #e67e22; 
            border: none; 
            color: white;
            padding: 12px 28px; 
            font-size: 16px;
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 6px; 
            box-shadow: 0px 4px #d35400;
            transition: all 0.1s;
        }
        button:active {
            box-shadow: 0px 0px #d35400;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <h1>24RADIO NETWORK</h1>
    <p>Select your frequency and press SWAP to join the ATC Discord Channel</p>

    <div class="radio-chassis">
        <div class="frequency-box">
            <div class="label">COM 1 ACTIVE</div>
            <div id="active-display" class="display">118.700</div>
        </div>
        
        <div class="frequency-box">
            <div class="label">COM 1 STBY</div>
            <div id="standby-display" class="display">121.900</div>
        </div>

        <div class="controls">
            <button onclick="swapFrequencies()">◀ XFER / SWAP ▶</button>
        </div>
    </div>

    <script>
        // REPLACE THE GUILD AND CHANNEL IDS BELOW WITH YOUR ACTUAL DISCORD SERVERS
        const FREQUENCY_DATABASE = {
            "118.700": { guild: "123456789012345678", channel: "987654321098765432" }, // Example: Tower
            "121.900": { guild: "123456789012345678", channel: "555555555555555555" }  // Example: Ground
        };

        function swapFrequencies() {
            let activeEl = document.getElementById("active-display");
            let standbyEl = document.getElementById("standby-display");

            // Swap displays
            let temp = activeEl.innerText;
            activeEl.innerText = standbyEl.innerText;
            standbyEl.innerText = temp;

            // Trigger Discord Link
            let newActiveFreq = activeEl.innerText;
            let channelData = FREQUENCY_DATABASE[newActiveFreq];

            if (channelData) {
                window.location.href = `discord://://discord.com{channelData.guild}/${channelData.channel}`;
            } else {
                console.log("Frequency not configured in database.");
            }
        }
    </script>
</body>
</html>
