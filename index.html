<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Favicon.png">
<title>24Radio - ATC24 Radio Client</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #0f0;
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  margin: 15px 0;
}

.main-container {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  flex-wrap: wrap;
}

/* RADIO PANEL */
#radio-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  display: inline-block;
  padding: 20px;
  flex: 0 0 auto;
  position: relative;
}

/* FREQ DISPLAYS */
#active-freq {
  font-size: 20px;
  font-family: "Courier New", monospace;
  background: #000;
  border: 2px solid #0f0;
  padding: 8px 16px;
  width: 160px;
  text-align: center;
}

#standby-freq {
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 8px 16px;
  font-size: 20px;
  font-family: "Courier New", monospace;
  width: 160px;
  text-align: center;
  outline: none;
}

/* SWAP */
#swap-btn {
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 8px 16px;
  font-size: 20px;
  font-family: "Courier New", monospace;
  cursor: pointer;
  width: 160px;
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: center;
}

#swap-btn:hover {
  background: #003300;
}

/* ROW */
.freq-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 15px;
  margin-bottom: 15px;
}

.freq-box-wrapper,
.swap-box-wrapper {
  display: flex;
  flex-direction: column;
}

/* KNOB */
.knob-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 15px;
  user-select: none;
  position: relative;
}

.knob {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #000;
  border: 3px solid #0f0;
  position: relative;
  cursor: grab;
}

.knob-marker {
  width: 8px;
  height: 20px;
  background: #0f0;
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
}

.knob-label {
  margin-top: 12px;
  font-family: "Courier New", monospace;
  font-size: 14px;
}

/* STEP BUTTON (BOTTOM RIGHT OF PANEL) */
#step-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;

  background: #000;
  color: #0f0;
  border: 2px solid #0f0;

  font-family: "Courier New", monospace;
  font-size: 12px;

  padding: 4px 8px;
  cursor: pointer;

  user-select: none;
}

#step-btn:hover {
  background: #003300;
}

/* CONTROLLER PANEL */
#controller-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  width: 90%;
  max-width: 900px;
  padding: 15px;
  flex: 1;
  min-width: 400px;
}

.panel-title {
  font-family: "Courier New", monospace;
  font-size: 14px;
  margin-bottom: 10px;
}

.controller-toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.controller-toolbar input,
.controller-toolbar select {
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 6px;
  font-family: "Courier New", monospace;
}

#frequency-list {
  margin-top: 10px;
  padding: 10px;
  background: #111;
  border: 2px solid #0f0;
  border-radius: 6px;
  max-height: 500px;
  overflow-y: auto;
}
</style>
</head>

<body>
<h1>24Radio</h1>

<div class="main-container">

<div id="radio-panel">

  <div class="freq-row">
    <div>
      <div>COM1 ACTIVE</div>
      <div id="active-freq">---</div>
    </div>

    <div>
      <div>COM1 STANDBY</div>
      <input type="text" id="standby-freq" placeholder="118.100" maxlength="7">
    </div>

    <div>
      <button id="swap-btn">SWAP</button>
    </div>
  </div>

  <div class="knob-container">
    <div class="knob" id="freq-knob">
      <div class="knob-marker"></div>
    </div>
    <div class="knob-label">TUNE</div>

    <!-- STEP BUTTON -->
    <button id="step-btn" data-step="0.05">STEP: 0.050</button>
  </div>

  <div id="result"></div>
</div>

<div id="controller-panel">

  <div class="panel-title">FREQUENCY DATABASE</div>

  <div class="controller-toolbar">
    <input type="text" id="search-bar" placeholder="Search frequencies..." />

    <select id="filter-area">
      <option value="all">All Areas</option>
    </select>

    <select id="filter-airport">
      <option value="all">All Airports</option>
    </select>

    <select id="filter-type">
      <option value="all">All Types</option>
      <option value="GROUND">Ground</option>
      <option value="TOWER">Tower</option>
      <option value="APPROACH">Center</option>
      <option value="ATIS">ATIS</option>
    </select>
  </div>

  <div id="frequency-list"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
