<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="Favicon.png">
  <title>24Radio - ATC24 Radio Client</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: #0f0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 15px 0;
    }

    .main-container {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      flex-wrap: wrap;
    }

    /* ================= RADIO PANEL ================= */
    #radio-panel {
      background: #222;
      border: 3px solid #0f0;
      border-radius: 8px;
      padding: 20px;
    }

    #active-freq {
      font-size: 20px;
      font-family: "Courier New", monospace;
      background: #000;
      border: 2px solid #0f0;
      padding: 8px 16px;
      min-width: 120px;
      display: inline-block;
    }

    #standby-freq {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 8px 16px;
      font-size: 20px;
      font-family: "Courier New", monospace;
      min-width: 120px;
      text-align: center;
      outline: none;
    }

    #swap-btn {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 8px 16px;
      font-size: 20px;
      cursor: pointer;
    }

    #swap-btn:hover {
      background: #003300;
    }

    .freq-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
    }

    .freq-box-wrapper {
      display: flex;
      flex-direction: column;
    }

    .freq-label {
      font-size: 12px;
      margin-bottom: 5px;
    }

    /* ================= CONTROLLER PANEL ================= */
    #controller-panel {
      background: #222;
      border: 3px solid #0f0;
      border-radius: 8px;
      width: 90%;
      max-width: 900px;
      padding: 15px;
    }

    .panel-title {
      font-family: "Courier New", monospace;
      font-size: 14px;
      margin-bottom: 10px;
      border-bottom: 1px solid #0f0;
      padding-bottom: 6px;
    }

    .controller-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .controller-toolbar input,
    .controller-toolbar select {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 6px;
      font-family: "Courier New", monospace;
    }

    #frequency-list {
      margin-top: 10px;
      padding: 10px;
      background: #111;
      border: 2px solid #0f0;
      border-radius: 6px;
      max-height: 500px;
      overflow-y: auto;
    }

    .area-header {
      margin-top: 10px;
      padding: 6px;
      background: #000;
      border-left: 3px solid #0f0;
      font-weight: bold;
    }

    /* ✅ UPDATED ROW (NOW WITH BUTTON SPACE) */
    .freq-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px;
      border-bottom: 1px solid #0a0;
      font-family: "Courier New", monospace;
    }

    .freq-left {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .dot {
      font-size: 16px;
    }

    .freq-right {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .tune-btn {
      background: #000;
      border: 1px solid #0f0;
      color: #0f0;
      padding: 4px 10px;
      cursor: pointer;
      font-family: "Courier New", monospace;
    }

    .tune-btn:hover {
      background: #003300;
    }
  </style>
</head>

<body>
  <h1>24Radio</h1>

  <div class="main-container">

    <!-- RADIO -->
    <div id="radio-panel">

      <div class="freq-row">
        <div class="freq-box-wrapper">
          <div class="freq-label">ACTIVE</div>
          <div id="active-freq">---</div>
        </div>

        <div class="freq-box-wrapper">
          <div class="freq-label">STANDBY</div>
          <input type="text" id="standby-freq">
        </div>

        <button id="swap-btn">SWAP</button>
      </div>

    </div>

    <!-- DATABASE -->
    <div id="controller-panel">

      <div class="panel-title">FREQUENCY DATABASE</div>

      <div class="controller-toolbar">
        <input type="text" id="search-bar" placeholder="Search...">
      </div>

      <div id="frequency-list"></div>

    </div>

  </div>

  <script src="app.js"></script>

  <!-- ✅ TUNE FUNCTION HOOK -->
  <script>
    function setStandby(freq) {
      const input = document.getElementById("standby-freq");
      if (!input) return;
      input.value = freq;
      input.dispatchEvent(new Event("input"));
    }
  </script>

</body>
</html>
