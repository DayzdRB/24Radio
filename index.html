<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name = "viewport" content="width=device-width, initial-scale = 1.0">
  <link rel ="icon"type="image/png" href="Favicon.png">
  <title>24Radio - ATC24 Radio Client</title>

  <style>
    body{
      background: #111;
      color: #0f0;
      font-family: Arial, sans-serif;
      text-align: center;
    
    }

    #radio-panel{
      background: #222;
      border: 3px solid #0f0;
      border-radius: 8px;
      display: inline-block;
      padding: 20px;
      margin-top: 20px;
    }

    #active-freq, #standby-freq{
    font-size: 20px;
    font-family: "Courier New", monospace;
    background: #000;
    border: 2px solid #0f0;
    padding: 8px 16px;
    display: incline-block;
    min0width: 120px;
    }

    #freq-input{
    background: #000;
    color: #0f0;
    border: 2px solid #0f0;
    padding: 6px;
    font-size: 16px;
    text-align: center;
    }

    button{
    background: #000;
    color: #0f0;
    border: 2px solid #0f0;
    padding: 6px 12px;
    font-size: 16px;
    cursor: pointer;
    }

    button:hover{
    background: #003300;
    }

    #result{
    margin-top: 10px;
    font-size: 14px;
    color: 8f8;
    }
  </style>
</head>
<body>
  <h1>24Radio</h1>

  <div id="radio-panel">
    <div id="active-display">
      <div>COM1 ACTIVE</div>
      <div id="active-freq">---</div>
  </div>

  <div id="standby-display">
    <div>COM1 STANDBY</div>
    <div id="standby-freq"></div>
  </div>

  <div id="controls">
    <input type="text" id="freq-input" placeholder = "118.100">
    <button id="tune-btn">Tune</button>
    <button id="swap-btn">SWAP</button>
  </div>

  <div id="result"></div>
  </div>

  <script src= "app.js"></script>
</body>
</html>
