<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="Favicon.png">
  <title>24Radio - ATC24 Radio Client</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: #0f0;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      margin: 15px 0;
    }

    .main-container {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 20px;
      padding: 10px;
      flex-wrap: wrap;
    }

    /* ================= RADIO PANEL ================= */
    #radio-panel {
      background: #222;
      border: 3px solid #0f0;
      border-radius: 8px;
      display: inline-block;
      padding: 20px;
      margin-top: 0;
    }

    #active-freq {
      font-size: 20px;
      font-family: "Courier New", monospace;
      background: #000;
      border: 2px solid #0f0;
      padding: 8px 16px;
      display: inline-block;
      min-width: 120px;
    }

    #standby-freq {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 8px 16px;
      font-size: 20px;
      font-family: "Courier New", monospace;
      min-width: 120px;
      text-align: center;
      outline: none;
    }

    #standby-freq:focus {
      border-color: #0ff;
      box-shadow: 0 0 10px #0ff;
    }

    #swap-btn {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 8px 16px;
      font-size: 20px;
      cursor: pointer;
    }

    #swap-btn:hover {
      background: #003300;
    }

    /* ================= KNOB ================= */
    .knob-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 15px;
      user-select: none;
    }

    .knob {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #000;
      border: 3px solid #0f0;
      position: relative;
      cursor: grab;
    }

    .knob:active {
      cursor: grabbing;
    }

    .knob-marker {
      width: 8px;
      height: 20px;
      background: #0f0;
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
    }

    .knob-label {
      margin-top: 12px;
      color: #0f0;
      font-family: "Courier New", monospace;
    }

    /* ================= CONTROLLER PANEL ================= */
    #controller-panel {
      background: #222;
      border: 3px solid #0f0;
      border-radius: 8px;
      width: 90%;
      max-width: 900px;
      padding: 15px;
    }

    .panel-title {
      font-family: "Courier New", monospace;
      font-size: 14px;
      margin-bottom: 10px;
      border-bottom: 1px solid #0f0;
      padding-bottom: 6px;
    }

    .controller-toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .controller-toolbar input,
    .controller-toolbar select {
      background: #000;
      color: #0f0;
      border: 2px solid #0f0;
      padding: 6px;
      font-family: "Courier New", monospace;
    }

    #frequency-list {
      margin-top: 10px;
      padding: 10px;
      background: #111;
      border: 2px solid #0f0;
      border-radius: 6px;
      max-height: 500px;
      overflow-y: auto;
    }

    .area-header {
      margin-top: 10px;
      padding: 6px;
      background: #000;
      border-left: 3px solid #0f0;
      font-weight: bold;
      font-family: "Courier New", monospace;
    }

    /* ✅ FIXED ROW LAYOUT */
    .freq-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 4px 6px;
      border-bottom: 1px solid #0a0;
      font-family: "Courier New", monospace;
    }

    .dot {
      font-size: 16px;
    }

    /* pushes button to far right */
    .tune-btn {
      margin-left: auto;
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 3px 10px;
      font-family: "Courier New", monospace;
      cursor: pointer;
    }

    .tune-btn:hover {
      background: #003300;
    }
  </style>
</head>

<body>
  <h1>24Radio</h1>

  <div class="main-container">

    <!-- RADIO PANEL -->
    <div id="radio-panel">

      <div class="freq-row">
        <div class="freq-box-wrapper">
          <div id="active-freq">---</div>
        </div>

        <div class="freq-box-wrapper">
          <input type="text" id="standby-freq" placeholder="118.100">
        </div>

        <button id="swap-btn">SWAP</button>
      </div>

      <div class="knob-container">
        <div class="knob" id="freq-knob">
          <div class="knob-marker"></div>
        </div>
        <div class="knob-label">TUNE</div>
      </div>

    </div>

    <!-- CONTROLLER PANEL -->
    <div id="controller-panel">

      <div class="panel-title">FREQUENCY DATABASE</div>

      <div class="controller-toolbar">
        <input type="text" id="search-bar" placeholder="Search frequencies...">
      </div>

      <div id="frequency-list"></div>

    </div>

  </div>

  <script src="app.js"></script>

  <!-- ✅ TUNE FUNCTION -->
  <script>
    function setStandby(freq) {
      const input = document.getElementById("standby-freq");
      input.value = freq;
      input.dispatchEvent(new Event("input"));
    }
  </script>

</body>
</html>
