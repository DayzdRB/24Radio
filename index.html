<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Favicon.png">
<title>24Radio - ATC24 Radio Client</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #0f0;
  font-family: Arial, sans-serif;
}

h1 {
  text-align: center;
  margin: 15px 0;
}

.main-container {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 20px;
  padding: 10px;
  flex-wrap: wrap;
}

/* RADIO PANEL */
#radio-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  display: inline-block;
  padding: 20px;
  flex: 0 0 auto;
  position: relative;
}

/* TOP ROW */
.freq-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 15px;
  margin-bottom: 15px;
}

.freq-box-wrapper,
.swap-box-wrapper {
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
}

#active-freq,
#standby-freq {
  width: 160px;
  text-align: center;
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  font-family: "Courier New", monospace;
  font-size: 20px;
  padding: 8px 16px;
}

/* SWAP */
#swap-btn {
  width: 160px;
  height: 46px;
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  font-family: "Courier New", monospace;
  cursor: pointer;
}

/* KNOB */
.knob-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 15px;
  user-select: none;
}

.knob {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  background: #000;
  border: 3px solid #0f0;
  position: relative;
  cursor: grab;
}

.knob-marker {
  width: 8px;
  height: 20px;
  background: #0f0;
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
}

.knob-label {
  margin-top: 12px;
  font-size: 14px;
}

/* STEP BUTTON — aligned under STANDBY column */
#step-btn {
  width: 160px;
  height: 46px;

  margin-left: 175px; /* aligns under middle (standby) column */

  margin-top: 15px;

  background: #000;
  color: #0f0;
  border: 2px solid #0f0;

  font-family: "Courier New", monospace;
  font-size: 14px;

  display: flex;
  align-items: center;
  justify-content: center;

  white-space: nowrap;
  cursor: pointer;
}

#step-btn:hover {
  background: #003300;
}

/* CONTROLLER PANEL */
#controller-panel {
  background: #222;
  border: 3px solid #0f0;
  border-radius: 8px;
  width: 90%;
  max-width: 900px;
  padding: 15px;
  flex: 1;
  min-width: 400px;
}

.panel-title {
  font-family: "Courier New", monospace;
  font-size: 14px;
  margin-bottom: 10px;
}

.controller-toolbar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.controller-toolbar input,
.controller-toolbar select {
  background: #000;
  color: #0f0;
  border: 2px solid #0f0;
  padding: 6px;
  font-family: "Courier New", monospace;
}

#frequency-list {
  margin-top: 10px;
  padding: 10px;
  background: #111;
  border: 2px solid #0f0;
  border-radius: 6px;
  max-height: 500px;
  overflow-y: auto;
}
</style>
</head>

<body>

<h1>24Radio</h1>

<div class="main-container">

<div id="radio-panel">

  <div class="freq-row">
    <div class="freq-box-wrapper">
      <div>COM1 ACTIVE</div>
      <div id="active-freq">---</div>
    </div>

    <div class="freq-box-wrapper">
      <div>COM1 STANDBY</div>
      <input id="standby-freq" placeholder="118.100">
    </div>

    <div class="swap-box-wrapper">
      <button id="swap-btn">SWAP</button>
    </div>
  </div>

  <div class="knob-container">
    <div class="knob" id="freq-knob">
      <div class="knob-marker"></div>
    </div>
    <div class="knob-label">TUNE</div>
  </div>

  <button id="step-btn">STEP: 0.050</button>

</div>

<div id="controller-panel">

  <div class="panel-title">FREQUENCY DATABASE</div>

  <div class="controller-toolbar">
    <input type="text" id="search-bar">
    <select id="filter-area"></select>
    <select id="filter-airport"></select>
    <select id="filter-type"></select>
  </div>

  <div id="frequency-list"></div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
